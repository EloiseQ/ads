  cv.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  pw = W - PAD.l - PAD.r;
  ph = H - PAD.t - PAD.b;
  draw();
}

const maxDay = 52, maxSpend = 9.5, minROI = 0.8, maxROI = 5.0;

function xPos(day) { return PAD.l + (day / maxDay) * pw; }
function ySpend(v) { return PAD.t + (1 - v / maxSpend) * ph; }
function yROI(v) { return PAD.t + (1 - (v - minROI) / (maxROI - minROI)) * ph; }

function draw() {
  ctx.clearRect(0, 0, W, H);

  stages.forEach(st => {
    ctx.fillStyle = st.bg;
    const x0 = xPos(st.s), x1 = xPos(st.e);
    ctx.globalAlpha = 0.55;
    ctx.fillRect(x0, PAD.t, x1 - x0, ph);
    ctx.globalAlpha = 1;
    ctx.fillStyle = st.lc;
    ctx.font = '600 10px Inter,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(st.name, (x0 + x1) / 2, PAD.t + 16);
  });

  ctx.strokeStyle = '#CBD5E1'; ctx.lineWidth = 1; ctx.setLineDash([4,3]);
  stages.slice(1).forEach(st => {
    ctx.beginPath(); ctx.moveTo(xPos(st.s), PAD.t); ctx.lineTo(xPos(st.s), PAD.t + ph); ctx.stroke();
  });
  ctx.setLineDash([]);

  const y1x = ySpend(1);
  ctx.strokeStyle = 'rgba(59,130,246,.2)'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(PAD.l, y1x); ctx.lineTo(PAD.l + pw, y1x); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = 'rgba(59,130,246,.35)'; ctx.font = '500 9px Inter'; ctx.textAlign = 'left';
  ctx.fillText('1× baseline', PAD.l + 4, y1x - 4);

  ctx.beginPath();
  ctx.moveTo(xPos(D.days[0]), ySpend(0));
  D.days.forEach((d, i) => ctx.lineTo(xPos(d), ySpend(D.spend[i])));
  ctx.lineTo(xPos(D.days[D.days.length-1]), ySpend(0));
  ctx.closePath();
  ctx.fillStyle = 'rgba(59,130,246,.08)';
  ctx.fill();

  for (let i = 0; i < D.days.length - 1; i++) {
    const x0 = xPos(D.days[i]), x1 = xPos(D.days[i+1]);
    const yg0 = yROI(D.roiGuard[i]), yg1 = yROI(D.roiGuard[i+1]);
    const ya0 = yROI(D.roiActual[i]), ya1 = yROI(D.roiActual[i+1]);
    const above = D.roiActual[i] >= D.roiGuard[i];
    ctx.beginPath();
    ctx.moveTo(x0, yg0); ctx.lineTo(x1, yg1); ctx.lineTo(x1, ya1); ctx.lineTo(x0, ya0);
    ctx.closePath();
    ctx.fillStyle = above ? 'rgba(34,197,94,.1)' : 'rgba(239,68,68,.1)';
    ctx.fill();
  }

  ctx.beginPath(); ctx.strokeStyle = '#3B82F6'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
  D.days.forEach((d, i) => { i === 0 ? ctx.moveTo(xPos(d), ySpend(D.spend[i])) : ctx.lineTo(xPos(d), ySpend(D.spend[i])); });
  ctx.stroke();

  ctx.beginPath(); ctx.strokeStyle = '#EF4444'; ctx.lineWidth = 2; ctx.setLineDash([7,4]);
  D.days.forEach((d, i) => { i === 0 ? ctx.moveTo(xPos(d), yROI(D.roiGuard[i])) : ctx.lineTo(xPos(d), yROI(D.roiGuard[i])); });
  ctx.stroke(); ctx.setLineDash([]);

  ctx.beginPath(); ctx.strokeStyle = '#F97316'; ctx.lineWidth = 2; ctx.globalAlpha = 0.75;
  D.days.forEach((d, i) => { i === 0 ? ctx.moveTo(xPos(d), yROI(D.roiActual[i])) : ctx.lineTo(xPos(d), yROI(D.roiActual[i])); });
  ctx.stroke(); ctx.globalAlpha = 1;

  annotations.forEach(a => {
    const x = xPos(a.day), y = PAD.t + ph * (1 - a.y);
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = a.c; ctx.lineWidth = 1.5;
    const tw = ctx.measureText(a.text).width + 16;
    const bh = 22, bx = x - tw/2, by = y - bh/2;
    roundRect(ctx, bx, by, tw, bh, 6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = a.c; ctx.font = '700 9px Inter,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(a.text, x, y + 3.5);
  });

  ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(PAD.l, PAD.t); ctx.lineTo(PAD.l, PAD.t + ph); ctx.lineTo(PAD.l + pw, PAD.t + ph); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(PAD.l + pw, PAD.t); ctx.lineTo(PAD.l + pw, PAD.t + ph); ctx.stroke();

  ctx.fillStyle = '#3B82F6'; ctx.font = '500 10px Inter'; ctx.textAlign = 'right';
  [0, 2, 4, 6, 8].forEach(v => {
    ctx.fillText(v + '×', PAD.l - 6, ySpend(v) + 3);
    if (v > 0) {
      ctx.strokeStyle = 'rgba(0,0,0,.04)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(PAD.l, ySpend(v)); ctx.lineTo(PAD.l + pw, ySpend(v)); ctx.stroke();
    }
  });
  ctx.save(); ctx.translate(14, PAD.t + ph/2); ctx.rotate(-Math.PI/2);
  ctx.fillStyle = '#3B82F6'; ctx.font = '600 11px Inter'; ctx.textAlign = 'center';
  ctx.fillText('Budget Intensity (× baseline)', 0, 0); ctx.restore();

  ctx.fillStyle = '#EF4444'; ctx.font = '500 10px Inter'; ctx.textAlign = 'left';
  [1, 2, 3, 4, 5].forEach(v => ctx.fillText(v + '×', PAD.l + pw + 6, yROI(v) + 3));
  ctx.save(); ctx.translate(W - 12, PAD.t + ph/2); ctx.rotate(Math.PI/2);
  ctx.fillStyle = '#EF4444'; ctx.font = '600 11px Inter'; ctx.textAlign = 'center';
  ctx.fillText('ROI', 0, 0); ctx.restore();

  ctx.fillStyle = '#64748B'; ctx.font = '500 9px Inter'; ctx.textAlign = 'center';
  const xticks = [[0,'D0'],[7,'D7'],[14,'D14'],[19,'D19'],[24,'SBD Start'],[27,'Peak'],[31,'SBD End'],[34,'D34'],[38,'D38'],[45,'D45'],[52,'D52']];
  xticks.forEach(([d,l]) => {
    const x = xPos(d);
    ctx.fillText(l, x, PAD.t + ph + 14);
    if (d === 24 || d === 31) {
      ctx.fillStyle = d === 24 ? '#EF4444' : '#F59E0B';
      ctx.font = '700 9px Inter';
      ctx.fillText(l, x, PAD.t + ph + 14);
      ctx.fillStyle = '#64748B'; ctx.font = '500 9px Inter';
    }
  });
  ctx.fillStyle = '#94A3B8'; ctx.font = '500 10px Inter';
  ctx.fillText('Days from Campaign Start', PAD.l + pw/2, H - 6);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y); ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

cv.addEventListener('mousemove', e => {
  const rect = cv.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const day = ((mx - PAD.l) / pw) * maxDay;
  if (day < 0 || day > maxDay || my < PAD.t || my > PAD.t + ph) {
    tip.classList.remove('show'); return;
  }
  let best = 0, bestDist = 1e9;
  D.days.forEach((d, i) => { const dist = Math.abs(d - day); if (dist < bestDist) { bestDist = dist; best = i; } });

  const sp = D.spend[best];
  const rg = D.roiGuard[best];
  const ra = D.roiActual[best];
  const dd = D.days[best];

  let stageName = '';
  stages.forEach(st => { if (dd >= st.s && dd < st.e) stageName = st.name; });
  if (dd >= 52) stageName = 'Stabilized';

  tip.innerHTML = `
    <div class="tl">Day ${Math.round(dd)} — ${stageName}</div>
    <div class="tr">
      <div class="tc"><div class="tk" style="color:#60A5FA">Budget</div><div class="tv" style="color:#3B82F6">${sp.toFixed(1)}× ($$${Math.round(sp * D.baselineDaily).toLocaleString()}/d)</div></div>
      <div class="tc"><div class="tk" style="color:#FCA5A5">ROI Floor</div><div class="tv" style="color:#EF4444">${rg.toFixed(1)}×</div></div>
      <div class="tc"><div class="tk" style="color:#FDBA74">Est. ROI</div><div class="tv" style="color:#F97316">${ra.toFixed(2)}×</div></div>
    </div>`;
  tip.classList.add('show');

  let tx = mx + 16, ty = my - 40;
  if (tx + 300 > W) tx = mx - 280;
  if (ty < 0) ty = my + 16;
  tip.style.left = tx + 'px';
  tip.style.top = ty + 'px';

  draw();
  ctx.strokeStyle = 'rgba(100,116,139,.25)'; ctx.lineWidth = 1; ctx.setLineDash([3,3]);
  const cx = xPos(dd);
  ctx.beginPath(); ctx.moveTo(cx, PAD.t); ctx.lineTo(cx, PAD.t + ph); ctx.stroke();
  ctx.setLineDash([]);
  [[ySpend(sp), '#3B82F6'], [yROI(rg), '#EF4444'], [yROI(ra), '#F97316']].forEach(([y, c]) => {
    ctx.beginPath(); ctx.arc(cx, y, 5, 0, Math.PI*2);
    ctx.fillStyle = '#fff'; ctx.fill();
    ctx.strokeStyle = c; ctx.lineWidth = 2; ctx.stroke();
  });
});

cv.addEventListener('mouseleave', () => { tip.classList.remove('show'); draw(); });

window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
